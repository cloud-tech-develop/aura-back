      responses:
        "201":
          description: Brand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "400":
          description: Bad Request

    get:
      summary: List brands
      tags:
        - Catalog - Brands
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of brands
        "401":
          description: Unauthorized

  /catalog/brands/{id}:
    get:
      summary: Get brand by ID
      tags:
        - Catalog - Brands
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Brand details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "401":
          description: Unauthorized
        "404":
          description: Not found

    put:
      summary: Update brand
      tags:
        - Catalog - Brands
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Brand updated
        "401":
          description: Unauthorized

    delete:
      summary: Delete brand
      tags:
        - Catalog - Brands
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Brand deleted
        "401":
          description: Unauthorized