components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Enterprise:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        commercial_name:
          type: string
        slug:
          type: string
        sub_domain:
          type: string
        email:
          type: string
          format: email
        document:
          type: string
        dv:
          type: string
        phone:
          type: string
        municipality_id:
          type: string
        municipality:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        enterprise_id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
        third_party:
          $ref: "#/components/schemas/ThirdParty"
    Role:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        level:
          type: integer
          description: Role hierarchy level (0=highest, e.g. SUPERADMIN)
    ThirdParty:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name:
          type: string
        document_number:
          type: string
        document_type:
          type: string
        personal_email:
          type: string
          format: email
        tax_responsibility:
          type: string
        is_employee:
          type: boolean
        created_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        category_id:
          type: integer
          format: int64
        brand_id:
          type: integer
          format: int64
        cost_price:
          type: number
          format: double
        sale_price:
          type: number
          format: double
        tax_rate:
          type: number
          format: double
        min_stock:
          type: integer
        current_stock:
          type: integer
        image_url:
          type: string
        status:
          type: string
        enterprise_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        parent_id:
          type: integer
          format: int64
        enterprise_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Brand:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        enterprise_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
