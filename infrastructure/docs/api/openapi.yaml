openapi: 3.0.0
info:
  title: Aura Back API
  description: API documentation for Aura Back application
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/anomalyco/opencode/issues
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /login:
    post:
      summary: Authenticate user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - slug
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                slug:
                  type: string
                  description: Tenant slug
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
  /me:
    get:
      summary: Get current user information
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    format: int64
                  enterprise_id:
                    type: integer
                    format: int64
                  slug:
                    type: string
                  email:
                    type: string
                  roles:
                    type: array
                    items:
                      type: string
        '401':
          description: Unauthorized
  /enterprises:
    post:
      summary: Create enterprise
      tags:
        - Enterprises
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - name
                - slug
                - email
              properties:
                password:
                  type: string
                  description: Minimum 8 characters
                name:
                  type: string
                commercial_name:
                  type: string
                slug:
                  type: string
                sub_domain:
                  type: string
                email:
                  type: string
                  format: email
                document:
                  type: string
                dv:
                  type: string
                phone:
                  type: string
                municipality_id:
                  type: string
                municipality:
                  type: string
      responses:
        '201':
          description: Enterprise created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enterprise'
        '400':
          description: Bad Request
        '409':
          description: Conflict (Enterprise already exists)
    get:
      summary: List enterprises
      tags:
        - Enterprises
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Items per page
        - in: query
          name: status
          schema:
            type: string
          description: Filter by status
      responses:
        '200':
          description: List of enterprises
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Enterprise'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
        '401':
          description: Unauthorized
  /enterprises/{slug}:
    get:
      summary: Get enterprise by slug
      tags:
        - Enterprises
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Enterprise slug
      responses:
        '200':
          description: Enterprise found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enterprise'
        '401':
          description: Unauthorized
        '404':
          description: Enterprise not found
    put:
      summary: Update enterprise
      tags:
        - Enterprises
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Enterprise slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                commercial_name:
                  type: string
                sub_domain:
                  type: string
                phone:
                  type: string
                municipality_id:
                  type: string
                municipality:
                  type: string
      responses:
        '200':
          description: Enterprise updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enterprise'
        '401':
          description: Unauthorized
        '404':
          description: Enterprise not found
  /enterprises/{slug}/status:
    patch:
      summary: Update enterprise status
      tags:
        - Enterprises
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Enterprise slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, SUSPENDED, DEBT]
      responses:
        '200':
          description: Status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  slug:
                    type: string
                  status:
                    type: string
                  updatedAt:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
        '404':
          description: Enterprise not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Enterprise:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        commercial_name:
          type: string
        slug:
          type: string
        sub_domain:
          type: string
        email:
          type: string
          format: email
        document:
          type: string
        dv:
          type: string
        phone:
          type: string
        municipality_id:
          type: string
        municipality:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
