openapi: 3.0.0
info:
  title: Aura Back API
  description: API documentation for Aura Back multi-tenant POS application
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/anomalyco/opencode/issues

servers:
  - url: http://localhost:8081
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Enterprise:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        commercial_name:
          type: string
        slug:
          type: string
        sub_domain:
          type: string
        email:
          type: string
          format: email
        document:
          type: string
        dv:
          type: string
        phone:
          type: string
        municipality_id:
          type: string
        municipality:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
        created_at:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        document_number:
          type: string
        document_type:
          type: string
          enum: [CC, CE, NIT, PASSPORT]
        active:
          type: boolean
        enterprise_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    ThirdParty:
      type: object
      properties:
        id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name:
          type: string
        commercial_name:
          type: string
        document_number:
          type: string
        document_type:
          type: string
        personal_email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        is_client:
          type: boolean
        is_provider:
          type: boolean
        is_employee:
          type: boolean
        enterprise_id:
          type: integer
          format: int64

    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        category_id:
          type: integer
          format: int64
        brand_id:
          type: integer
          format: int64
        cost_price:
          type: number
          format: decimal
        sale_price:
          type: number
          format: decimal
        tax_rate:
          type: number
          format: decimal
        min_stock:
          type: integer
        current_stock:
          type: integer
        image_url:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DISCONTINUED]
        enterprise_id:
          type: integer
          format: int64

    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        default_tax_rate:
          type: number
          format: decimal
        active:
          type: boolean
        parent_id:
          type: integer
          format: int64
        enterprise_id:
          type: integer
          format: int64
        global_id:
          type: string
        sync_status:
          type: string
        last_synced_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time

    CategoryListResult:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ListId"
      description: List of categories with only id and name (active categories only)

    Brand:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        active:
          type: boolean
          description: Indicates if the brand is active
        enterprise_id:
          type: integer
          format: int64
        global_id:
          type: string
        sync_status:
          type: string
        last_synced_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time

    BrandListResult:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ListId"
      description: List of brands with only id and name (active brands only)

    Unit:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        abbreviation:
          type: string
        active:
          type: boolean
        allow_decimals:
          type: boolean
        enterprise_id:
          type: integer
          format: int64
        global_id:
          type: string
        sync_status:
          type: string
        last_synced_at:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
        deleted_at:
          type: string

    UnitListResult:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ListId"
      description: List of units with only id and name

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string

    # Pagination schemas
    PageParams:
      type: object
      properties:
        page:
          type: integer
          default: 1
          description: Page number (starting from 1)
        limit:
          type: integer
          default: 10
          description: Number of items per page
        search:
          type: string
          description: Search term
        sort:
          type: string
          default: "id"
          description: Sort field
        order:
          type: string
          default: "asc"
          description: Sort order (asc or desc)
        params:
          type: object
          description: Additional filter parameters

    ListId:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    ProductPageResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
          format: int64
          description: Total number of items matching the filters
        page:
          type: integer
          format: int64
          description: Current page number
        limit:
          type: integer
          format: int64
          description: Items per page
        totalPages:
          type: integer
          format: int64
          description: Total number of pages

    CategoryPageResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        total:
          type: integer
          format: int64
        page:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64

    BrandPageResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Brand"
        total:
          type: integer
          format: int64
          description: Total number of items matching the filters
        page:
          type: integer
          format: int64
          description: Current page number
        limit:
          type: integer
          format: int64
          description: Items per page
        totalPages:
          type: integer
          format: int64
          description: Total number of pages

    UnitPageResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Unit"
        total:
          type: integer
          format: int64
        page:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64

    # Response envelope for all endpoints
    ResponseEnvelope:
      type: object
      properties:
        data:
          type: object
          description: Response data
        message:
          type: string
          description: Response message
        success:
          type: boolean
          description: Success indicator

paths:
  /login:
    post:
      summary: Authenticate user and get JWT token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Bad Request
        "401":
          description: Invalid credentials

  /me:
    get:
      summary: Get current authenticated user info
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User information
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    format: int64
                  enterprise_id:
                    type: integer
                    format: int64
                  slug:
                    type: string
                  email:
                    type: string
                  roles:
                    type: array
                    items:
                      type: string
        "401":
          description: Unauthorized

  # ============================================
  # ENTERPRISE MODULE (Public)
  # ============================================
  /enterprises:
    post:
      summary: Create new enterprise (public registration)
      tags:
        - Enterprise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
                - email
                - password
                - document
              properties:
                name:
                  type: string
                commercial_name:
                  type: string
                slug:
                  type: string
                sub_domain:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                document:
                  type: string
                dv:
                  type: string
                phone:
                  type: string
                municipality_id:
                  type: string
                municipality:
                  type: string
      responses:
        "201":
          description: Enterprise created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enterprise"
        "400":
          description: Bad Request
        "409":
          description: Conflict (slug or email already exists)

    get:
      summary: List enterprises
      tags:
        - Enterprise
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of enterprises
        "401":
          description: Unauthorized

  /enterprises/{slug}:
    get:
      summary: Get enterprise by slug
      tags:
        - Enterprise
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Enterprise details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enterprise"
        "401":
          description: Unauthorized
        "404":
          description: Enterprise not found

    put:
      summary: Update enterprise
      tags:
        - Enterprise
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                commercial_name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                municipality:
                  type: string
      responses:
        "200":
          description: Enterprise updated
        "401":
          description: Unauthorized

  /enterprises/{slug}/status:
    patch:
      summary: Update enterprise status
      tags:
        - Enterprise
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, SUSPENDED]
      responses:
        "200":
          description: Status updated
        "401":
          description: Unauthorized

  # ============================================
  # ADMIN MODULE - USERS
  # ============================================
  /admin/users:
    post:
      summary: Create new user
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - password
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                password:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                document_number:
                  type: string
                document_type:
                  type: string
                  enum: [CC, CE, NIT, PASSPORT]
                roles:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad Request
        "409":
          description: Conflict (email exists)

    get:
      summary: List users for enterprise
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of users
        "401":
          description: Unauthorized

  /admin/users/{id}:
    get:
      summary: Get user by ID
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "404":
          description: User not found

    put:
      summary: Update user
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                document_number:
                  type: string
      responses:
        "200":
          description: User updated
        "401":
          description: Unauthorized

  /admin/users/{id}/status:
    patch:
      summary: Update user active status
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - active
              properties:
                active:
                  type: boolean
      responses:
        "200":
          description: Status updated
        "401":
          description: Unauthorized

  /admin/users/{id}/roles:
    patch:
      summary: Assign roles to user
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role_ids
              properties:
                role_ids:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        "200":
          description: Roles assigned
        "401":
          description: Unauthorized

  /admin/roles:
    get:
      summary: List available roles for enterprise
      tags:
        - Admin - Users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of roles
        "401":
          description: Unauthorized

  # ============================================
  # ADMIN MODULE - THIRD PARTIES
  # ============================================
  /admin/third-parties:
    post:
      summary: Create third party
      tags:
        - Admin - Third Parties
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - document_number
                - document_type
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                commercial_name:
                  type: string
                document_number:
                  type: string
                document_type:
                  type: string
                personal_email:
                  type: string
                  format: email
                phone:
                  type: string
                address:
                  type: string
                is_client:
                  type: boolean
                is_provider:
                  type: boolean
                is_employee:
                  type: boolean
      responses:
        "201":
          description: Third party created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThirdParty"
        "400":
          description: Bad Request
        "409":
          description: Conflict

    get:
      summary: List third parties
      tags:
        - Admin - Third Parties
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum: [client, provider, employee]
      responses:
        "200":
          description: List of third parties
        "401":
          description: Unauthorized

  /admin/third-parties/{id}:
    get:
      summary: Get third party by ID
      tags:
        - Admin - Third Parties
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Third party details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThirdParty"
        "401":
          description: Unauthorized
        "404":
          description: Not found

    put:
      summary: Update third party
      tags:
        - Admin - Third Parties
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                commercial_name:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      responses:
        "200":
          description: Third party updated
        "401":
          description: Unauthorized

    delete:
      summary: Delete third party
      tags:
        - Admin - Third Parties
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Third party deleted
        "401":
          description: Unauthorized

  /admin/third-parties/document/{documentNumber}:
    get:
      summary: Get third party by document number
      tags:
        - Admin - Third Parties
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: documentNumber
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Third party details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThirdParty"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  # ============================================
  # CATALOG MODULE - PRODUCTS
  # ============================================
  /catalog/products:
    post:
      summary: Create product
      tags:
        - Catalog - Products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sku
                - name
                - cost_price
                - sale_price
              properties:
                sku:
                  type: string
                name:
                  type: string
                description:
                  type: string
                category_id:
                  type: integer
                  format: int64
                brand_id:
                  type: integer
                  format: int64
                cost_price:
                  type: number
                  format: decimal
                sale_price:
                  type: number
                  format: decimal
                tax_rate:
                  type: number
                  format: decimal
                min_stock:
                  type: integer
                image_url:
                  type: string
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Bad Request
        "409":
          description: Conflict (SKU exists)

    get:
      summary: List products
      tags:
        - Catalog - Products
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: category_id
          schema:
            type: integer
            format: int64
        - in: query
          name: brand_id
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: List of products
        "401":
          description: Unauthorized

  /catalog/products/exist/{sku}:
    get:
      summary: Check if product exists by SKU
      tags:
        - Catalog - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sku
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product existence check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                  sku:
                    type: string
                  product:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      name:
                        type: string
                      sku:
                        type: string
                      barcode:
                        type: string
        "401":
          description: Unauthorized

  /catalog/products/{id}:
    get:
      summary: Get product by ID
      tags:
        - Catalog - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          description: Unauthorized
        "404":
          description: Not found

    put:
      summary: Update product
      tags:
        - Catalog - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                cost_price:
                  type: number
                  format: decimal
                sale_price:
                  type: number
                  format: decimal
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, DISCONTINUED]
      responses:
        "200":
          description: Product updated
        "401":
          description: Unauthorized

    delete:
      summary: Delete product
      tags:
        - Catalog - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
