openapi: 3.0.0
info:
  title: Aura Back API
  description: API documentation for Aura Back application
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/anomalyco/opencode/issues
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /login:
    post:
      summary: Authenticate user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - slug
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                slug:
                  type: string
                  description: Tenant slug
      responses:
        "200":
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
  /me:
    get:
      summary: Get current user information
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    format: int64
                  enterprise_id:
                    type: integer
                    format: int64
                  slug:
                    type: string
                  email:
                    type: string
                  roles:
                    type: array
                    items:
                      type: string
        "401":
          description: Unauthorized
  /enterprises:
    post:
      summary: Create enterprise
      tags:
        - Enterprises
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - name
                - slug
                - email
              properties:
                password:
                  type: string
                  description: Minimum 8 characters
                name:
                  type: string
                commercial_name:
                  type: string
                slug:
                  type: string
                sub_domain:
                  type: string
                email:
                  type: string
                  format: email
                document:
                  type: string
                dv:
                  type: string
                phone:
                  type: string
                municipality_id:
                  type: string
                municipality:
                  type: string
      responses:
        "201":
          description: Enterprise created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enterprise"
        "400":
          description: Bad Request
        "409":
          description: Conflict (Enterprise already exists)
    get:
      summary: List enterprises
      tags:
        - Enterprises
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Items per page
        - in: query
          name: status
          schema:
            type: string
          description: Filter by status
      responses:
        "200":
          description: List of enterprises
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Enterprise"
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
        "401":
          description: Unauthorized
  /enterprises/{slug}:
    get:
      summary: Get enterprise by slug
      tags:
        - Enterprises
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Enterprise slug
      responses:
        "200":
          description: Enterprise found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enterprise"
        "401":
          description: Unauthorized
        "404":
          description: Enterprise not found
    put:
      summary: Update enterprise
      tags:
        - Enterprises
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Enterprise slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                commercial_name:
                  type: string
                sub_domain:
                  type: string
                phone:
                  type: string
                municipality_id:
                  type: string
                municipality:
                  type: string
      responses:
        "200":
          description: Enterprise updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enterprise"
        "401":
          description: Unauthorized
        "404":
          description: Enterprise not found
  /enterprises/{slug}/status:
    patch:
      summary: Update enterprise status
      tags:
        - Enterprises
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Enterprise slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, SUSPENDED, DEBT]
      responses:
        "200":
          description: Status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  slug:
                    type: string
                  status:
                    type: string
                  updatedAt:
                    type: string
                    format: date-time
        "401":
          description: Unauthorized
        "404":
          description: Enterprise not found
  /users:
    post:
      summary: Create user
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - password
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                password:
                  type: string
                  description: Minimum 8 characters
                roles:
                  type: array
                  items:
                    type: integer
                    format: int64
                first_name:
                  type: string
                last_name:
                  type: string
                document_number:
                  type: string
                document_type:
                  type: string
                  enum: [CC, CE, NIT, PASSPORT]
                personal_email:
                  type: string
                  format: email
                tax_responsibility:
                  type: string
                is_employee:
                  type: boolean
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad Request
        "409":
          description: Conflict (Email already exists)
    get:
      summary: List users for enterprise
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Items per page
        - in: query
          name: status
          schema:
            type: string
          description: Filter by status (active/inactive)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
        "401":
          description: Unauthorized
  /users/{id}:
    get:
      summary: Get user by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: User ID
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "404":
          description: User not found
    put:
      summary: Update user
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                document_number:
                  type: string
                document_type:
                  type: string
                personal_email:
                  type: string
                  format: email
                tax_responsibility:
                  type: string
                is_employee:
                  type: boolean
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "404":
          description: User not found
        "409":
          description: Conflict (Email already exists)
    patch:
      summary: Update user status
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - active
              properties:
                active:
                  type: boolean
      responses:
        "200":
          description: Status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  active:
                    type: boolean
        "401":
          description: Unauthorized
        "404":
          description: User not found
  /users/{id}/roles:
    patch:
      summary: Assign roles to user
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role_ids
              properties:
                role_ids:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        "200":
          description: Roles assigned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  role_ids:
                    type: array
                    items:
                      type: integer
                      format: int64
        "401":
          description: Unauthorized
        "404":
          description: User not found
  /roles:
    get:
      summary: List roles available for current user
      description: Returns roles filtered by the current user's role level. Only roles with level >= user's level are returned.
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
        "401":
          description: Unauthorized
  /products:
    post:
      summary: Create product
      tags:
        - Products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sku
                - name
                - category_id
                - cost_price
                - sale_price
              properties:
                sku:
                  type: string
                  description: Unique SKU per enterprise
                name:
                  type: string
                description:
                  type: string
                category_id:
                  type: integer
                  format: int64
                brand_id:
                  type: integer
                  format: int64
                cost_price:
                  type: number
                  format: double
                sale_price:
                  type: number
                  format: double
                tax_rate:
                  type: number
                  format: double
                  default: 19.00
                min_stock:
                  type: integer
                image_url:
                  type: string
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, DISCONTINUED]
      responses:
        "201":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Bad Request
        "409":
          description: Conflict (SKU already exists)
    get:
      summary: List products
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Items per page
        - in: query
          name: search
          schema:
            type: string
          description: Search by name or SKU
        - in: query
          name: category_id
          schema:
            type: integer
          description: Filter by category
        - in: query
          name: brand_id
          schema:
            type: integer
          description: Filter by brand
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
        "401":
          description: Unauthorized
  /products/{id}:
    get:
      summary: Get product by ID
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: Product ID
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          description: Unauthorized
        "404":
          description: Product not found
    put:
      summary: Update product
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: Product ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                category_id:
                  type: integer
                  format: int64
                brand_id:
                  type: integer
                  format: int64
                cost_price:
                  type: number
                  format: double
                sale_price:
                  type: number
                  format: double
                min_stock:
                  type: integer
                image_url:
                  type: string
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, DISCONTINUED]
      responses:
        "200":
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          description: Unauthorized
        "404":
          description: Product not found
        "409":
          description: Conflict (SKU already exists)
    delete:
      summary: Delete product (soft delete)
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: Product ID
      responses:
        "204":
          description: Product deleted successfully
        "401":
          description: Unauthorized
        "404":
          description: Product not found
  /categories:
    post:
      summary: Create category
      tags:
        - Categories
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                parent_id:
                  type: integer
                  format: int64
      responses:
        "201":
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Bad Request
        "409":
          description: Conflict (Category name already exists)
    get:
      summary: List categories
      tags:
        - Categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          description: Unauthorized
  /categories/{id}:
    get:
      summary: Get category by ID
      tags:
        - Categories
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: Category ID
      responses:
        "200":
          description: Category found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          description: Unauthorized
        "404":
          description: Category not found
    put:
      summary: Update category
      tags:
        - Categories
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: Category ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                parent_id:
                  type: integer
                  format: int64
      responses:
        "200":
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          description: Unauthorized
        "404":
          description: Category not found
  /brands:
    post:
      summary: Create brand
      tags:
        - Brands
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Brand created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "400":
          description: Bad Request
        "409":
          description: Conflict (Brand name already exists)
    get:
      summary: List brands
      tags:
        - Brands
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
        "401":
          description: Unauthorized
  /brands/{id}:
    get:
      summary: Get brand by ID
      tags:
        - Brands
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: Brand ID
      responses:
        "200":
          description: Brand found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "401":
          description: Unauthorized
        "404":
          description: Brand not found
    put:
      summary: Update brand
      tags:
        - Brands
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: Brand ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Brand updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "401":
          description: Unauthorized
        "404":
          description: Brand not found
  /invoices/generate:
    post:
      summary: Generate Invoice From Sale
      tags:
        - Invoices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /invoices:
    post:
      summary: Create Invoice
      tags:
        - Invoices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
    get:
      summary: List Invoices
      tags:
        - Invoices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /invoices/{id}:
    get:
      summary: Get Invoice by ID
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /invoices/number/{invoiceNumber}:
    get:
      summary: Get Invoice by Number
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: invoiceNumber
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /invoices/{id}/issue:
    post:
      summary: Issue Invoice
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /invoices/{id}/cancel:
    post:
      summary: Cancel Invoice
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /invoices/{id}/logs:
    get:
      summary: Get Invoice Logs
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /invoice-prefixes:
    post:
      summary: Create Invoice Prefix
      tags:
        - Invoices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
    get:
      summary: List Invoice Prefixes
      tags:
        - Invoices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /sales-orders:
    post:
      summary: Create Sales Order
      tags:
        - Sales
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
    get:
      summary: List Sales Orders
      tags:
        - Sales
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /sales-orders/{id}:
    get:
      summary: Get Sales Order by ID
      tags:
        - Sales
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /sales-orders/{id}/status:
    put:
      summary: Update Sales Order Status
      tags:
        - Sales
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful response
        "401":
          description: Unauthorized
  /sales-orders/{id}/cancel:
    post:
      summary: Cancel Sales Order
      tags:
        - Sales
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
